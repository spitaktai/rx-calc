<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f8f7f4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rx Calc">
<title>Medicine Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #6b6b68;
    --ink-faint: #a8a8a3;
    --line: #e8e6e0;
    --line-soft: #f0eee8;
    --accent: #2d4a3e;
    --accent-soft: #e8f0ec;
    --warn: #8b4513;
    --warn-soft: #faf0e6;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 12px 14px 20px;
  }

  .app {
    width: 100%;
    max-width: 480px;
  }

  header {
    margin-bottom: 12px;
    padding: 0 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .lang-btn {
    padding: 8px 18px;
    border: 1.5px solid var(--line);
    background: var(--surface);
    border-radius: 20px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink-soft);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  .lang-btn:active { transform: scale(0.95); }

  .lang-btn.th {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .brand-mark {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .brand-mark em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .brand-sub {
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .tagline { display: none; }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .field:last-child { margin-bottom: 0; }

  label {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .hint {
    font-size: 13px;
    color: var(--ink-faint);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }

  input[type="date"],
  input[type="text"],
  input[type="number"] {
    width: 100%;
    padding: 16px 16px;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    color: var(--ink);
    transition: border-color 0.15s, background 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="date"] {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fefefe;
  }

  input::placeholder {
    color: var(--ink-faint);
    font-family: 'Inter', sans-serif;
    font-size: 18px;
  }

  /* Pills-per-day: number + half-pill toggle */
  .dose-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .dose-row input {
    flex: 1;
  }

  .half-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    background: var(--surface);
    cursor: pointer;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 24px;
    color: var(--ink-soft);
    transition: all 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    min-width: 64px;
  }

  .half-toggle:active { transform: scale(0.97); }

  .half-toggle.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* Result panel */
  .result {
    background: var(--accent);
    color: white;
    border: none;
    padding: 20px 20px;
    text-align: center;
    position: relative;
  }

  .result.empty {
    background: var(--surface);
    color: var(--ink-faint);
    border: 1px dashed var(--line);
    padding: 28px 20px;
  }

  .result-label {
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.8;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .result-number {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 96px;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }

  .result-unit {
    font-size: 20px;
    opacity: 0.85;
    font-weight: 400;
  }

  .result-empty-msg {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--ink-faint);
  }

  /* Breakdown */
  .breakdown {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.2);
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: left;
  }

  .breakdown-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .breakdown-key {
    opacity: 0.75;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .breakdown-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 500;
  }

  .warning-banner {
    margin-top: 10px;
    padding: 12px 16px;
    background: var(--warn-soft);
    color: var(--warn);
    border-radius: var(--radius-sm);
    font-size: 15px;
    line-height: 1.5;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .warning-banner::before {
    content: '!';
    font-weight: 600;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--warn);
    color: var(--warn-soft);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* Footer actions */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  button.btn {
    flex: 1;
    padding: 18px;
    border: 1.5px solid var(--line);
    background: var(--surface);
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  button.btn:active { transform: scale(0.98); }
  button.btn:hover { color: var(--ink); border-color: var(--ink-faint); }

  /* Hide spinner on number inputs */
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type="number"] { -moz-appearance: textfield; }

  /* Dose preview text */
  .dose-preview {
    font-size: 14px;
    color: var(--ink-faint);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    min-height: 16px;
  }

  /* Subtle entrance */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result:not(.empty) {
    animation: fadeUp 0.25s ease-out;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <div class="brand-mark">Rx <em>Calc</em></div>
      <div class="brand-sub">v1.1</div>
    </div>
    <button class="lang-btn" id="langBtn">TH</button>
  </header>

  <div class="card">
    <div class="field">
      <label for="today">
        <span id="lbl-today">Today</span>
        <span class="hint" id="hint-today">visit date</span>
      </label>
      <input type="date" id="today">
    </div>

    <div class="field">
      <label for="next">
        <span id="lbl-next">Next appointment</span>
        <span class="hint" id="hint-next">incl. appt date</span>
      </label>
      <input type="date" id="next">
    </div>

    <div class="field">
      <label for="remaining">
        <span id="lbl-remaining">Tablets remaining</span>
        <span class="hint" id="hint-remaining">whole tablets</span>
      </label>
      <input type="text" inputmode="numeric" pattern="[0-9]*" id="remaining" placeholder="0">
    </div>

    <div class="field">
      <label for="perday">
        <span id="lbl-perday">Tablets per day</span>
        <span class="hint" id="hint-perday">tap ½ for half-tablet</span>
      </label>
      <div class="dose-row">
        <input type="text" inputmode="numeric" pattern="[0-9]*" id="perday" placeholder="0">
        <button type="button" class="half-toggle" id="halfBtn" aria-pressed="false">½</button>
      </div>
      <div class="dose-preview" id="dosePreview"></div>
    </div>
  </div>

  <div class="card result empty" id="resultCard">
    <div class="result-empty-msg" id="resultEmpty">Enter values to calculate</div>
    <div id="resultContent" style="display:none;">
      <div class="result-label" id="resultLabel">To give</div>
      <div class="result-number" id="resultNumber">0</div>
      <div class="result-unit" id="resultUnit">tablets</div>
      <div class="breakdown">
        <div class="breakdown-item">
          <div class="breakdown-key" id="bDaysKey">Days covered</div>
          <div class="breakdown-val" id="bDays">—</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-key" id="bNeededKey">Total for period</div>
          <div class="breakdown-val" id="bNeeded">—</div>
        </div>
        <div class="breakdown-item">
          <div class="breakdown-key" id="bRemainingKey">Tablets remaining</div>
          <div class="breakdown-val" id="bRemaining">—</div>
        </div>
      </div>
    </div>
  </div>

  <div id="warningSlot"></div>

  <div class="actions">
    <button class="btn" id="resetBtn">Reset</button>
  </div>

</div>

<script>
  // --- Translations ---
  const LANG = {
    en: {
      lblToday: 'Today',         hintToday: 'visit date',
      lblNext: 'Next appointment', hintNext: 'incl. appt date',
      lblRemaining: 'Tablets remaining', hintRemaining: 'whole tablets',
      lblPerday: 'Tablets per day', hintPerday: 'tap ½ for half-tablet',
      emptyMsg: 'Enter values to calculate',
      resultLabel: 'To give',
      resultUnit: 'tablets',
      bDaysKey: 'Days covered',
      bNeededKey: 'Total for period',
      bRemainingKey: 'Tablets remaining',
      dayUnit: 'days',
      pillUnit: 'tablets',
      doseUnit: 'tab/day',
      resetBtn: 'Reset',
      warnDateOrder: 'Next appointment is before today. Check the dates.',
      warnEnough: (rem, days) => `Patient has enough tablets (${rem}) to cover ${days} days. No dispensing needed.`,
    },
    th: {
      lblToday: 'วันนี้',           hintToday: 'วันที่มาพบแพทย์',
      lblNext: 'นัดครั้งถัดไป',     hintNext: 'รวมวันนัด',
      lblRemaining: 'ยาที่เหลืออยู่', hintRemaining: 'เม็ดเต็ม',
      lblPerday: 'ยาต่อวัน',        hintPerday: 'กด ½ สำหรับครึ่งเม็ด',
      emptyMsg: 'กรอกข้อมูลเพื่อคำนวณ',
      resultLabel: 'ให้ยา',
      resultUnit: 'เม็ด',
      bDaysKey: 'จำนวนวัน',
      bNeededKey: 'ยาทั้งหมดที่ต้องการ',
      bRemainingKey: 'ยาที่เหลืออยู่',
      dayUnit: 'วัน',
      pillUnit: 'เม็ด',
      doseUnit: 'เม็ด/วัน',
      resetBtn: 'รีเซ็ต',
      warnDateOrder: 'วันนัดอยู่ก่อนวันนี้ กรุณาตรวจสอบวันที่',
      warnEnough: (rem, days) => `ผู้ป่วยมียาเพียงพอ (${rem} เม็ด) สำหรับ ${days} วัน ไม่จำเป็นต้องจ่ายยาเพิ่ม`,
    }
  };

  let lang = 'en';
  const t = () => LANG[lang];

  function applyLang() {
    $('lbl-today').textContent     = t().lblToday;
    $('hint-today').textContent    = t().hintToday;
    $('lbl-next').textContent      = t().lblNext;
    $('hint-next').textContent     = t().hintNext;
    $('lbl-remaining').textContent = t().lblRemaining;
    $('hint-remaining').textContent= t().hintRemaining;
    $('lbl-perday').textContent    = t().lblPerday;
    $('hint-perday').textContent   = t().hintPerday;
    $('resultEmpty').textContent   = t().emptyMsg;
    $('resultLabel').textContent   = t().resultLabel;
    $('resultUnit').textContent    = t().resultUnit;
    $('bDaysKey').textContent      = t().bDaysKey;
    $('bNeededKey').textContent    = t().bNeededKey;
    $('bRemainingKey').textContent = t().bRemainingKey;
    resetBtn.textContent           = t().resetBtn;
    langBtn.textContent            = lang === 'en' ? 'TH' : 'EN';
    langBtn.classList.toggle('th', lang === 'th');
  }

  // --- Helpers ---
  const $ = (id) => document.getElementById(id);
  const todayEl = $('today');
  const nextEl = $('next');
  const remainingEl = $('remaining');
  const perdayEl = $('perday');
  const halfBtn = $('halfBtn');
  const dosePreview = $('dosePreview');
  const resultCard = $('resultCard');
  const resultEmpty = $('resultEmpty');
  const resultContent = $('resultContent');
  const resultNumber = $('resultNumber');
  const bDays = $('bDays');
  const bNeeded = $('bNeeded');
  const bRemaining = $('bRemaining');
  const warningSlot = $('warningSlot');
  const resetBtn = $('resetBtn');
  const langBtn = $('langBtn');

  // Language toggle
  langBtn.addEventListener('click', () => {
    lang = lang === 'en' ? 'th' : 'en';
    applyLang();
    update();
  });

  // Set today's date by default
  function isoDate(d) {
    const yr = d.getFullYear();
    const mo = String(d.getMonth() + 1).padStart(2, '0');
    const da = String(d.getDate()).padStart(2, '0');
    return `${yr}-${mo}-${da}`;
  }
  todayEl.value = isoDate(new Date());

  // Strip non-digit input on text fields used as numeric
  function digitsOnly(el) {
    el.addEventListener('input', () => {
      const cleaned = el.value.replace(/[^0-9]/g, '');
      if (cleaned !== el.value) el.value = cleaned;
      update();
    });
  }
  digitsOnly(remainingEl);
  digitsOnly(perdayEl);

  // Date change listeners
  todayEl.addEventListener('change', update);
  nextEl.addEventListener('change', update);

  // Half-pill toggle
  halfBtn.addEventListener('click', () => {
    const active = halfBtn.classList.toggle('active');
    halfBtn.setAttribute('aria-pressed', active ? 'true' : 'false');
    update();
  });

  // Reset
  resetBtn.addEventListener('click', () => {
    todayEl.value = isoDate(new Date());
    nextEl.value = '';
    remainingEl.value = '';
    perdayEl.value = '';
    halfBtn.classList.remove('active');
    halfBtn.setAttribute('aria-pressed', 'false');
    update();
    nextEl.focus();
  });

  // --- Core calculation ---
  function update() {
    const dose = computeDose();
    if (dose !== null) {
      const display = Number.isInteger(dose) ? dose.toString() : dose.toFixed(1);
      dosePreview.textContent = `= ${display} ${t().doseUnit}`;
    } else {
      dosePreview.textContent = '';
    }

    const result = computeResult();
    warningSlot.innerHTML = '';

    if (!result.ok) {
      resultCard.classList.add('empty');
      resultEmpty.style.display = 'block';
      resultContent.style.display = 'none';
      if (result.warning) showWarning(result.warning);
      return;
    }

    resultCard.classList.remove('empty');
    resultEmpty.style.display = 'none';
    resultContent.style.display = 'block';

    const sf = result.shortfall;
    resultNumber.textContent = Number.isInteger(sf) ? sf : sf.toFixed(1);
    bDays.textContent = result.days + ' ' + t().dayUnit;
    bNeeded.textContent = formatPills(result.needed);
    bRemaining.textContent = formatPills(result.remaining);

    if (result.warning) showWarning(result.warning);
  }

  function computeDose() {
    const base = parseInt(perdayEl.value, 10);
    if (isNaN(base) || base < 0) return null;
    const half = halfBtn.classList.contains('active') ? 0.5 : 0;
    const total = base + half;
    if (total === 0) return null;
    return total;
  }

  function computeResult() {
    const today = todayEl.value;
    const next = nextEl.value;
    const remaining = parseInt(remainingEl.value, 10);
    const dose = computeDose();

    if (!today || !next || isNaN(remaining) || dose === null) {
      return { ok: false };
    }

    const d1 = new Date(today + 'T00:00:00');
    const d2 = new Date(next + 'T00:00:00');

    if (d2 < d1) {
      return { ok: false, warning: t().warnDateOrder };
    }

    const ms = d2 - d1;
    const days = Math.round(ms / 86400000) + 1;

    const needed = days * dose;
    const shortfall = Math.max(0, needed - remaining);

    let warning = null;
    if (shortfall === 0) {
      warning = t().warnEnough(remaining, days);
    }

    return { ok: true, days, needed, remaining, shortfall, warning };
  }

  function formatPills(n) {
    const u = t().pillUnit;
    return Number.isInteger(n) ? `${n} ${u}` : `${n.toFixed(1)} ${u}`;
  }

  function showWarning(msg) {
    const div = document.createElement('div');
    div.className = 'warning-banner';
    div.textContent = msg;
    warningSlot.appendChild(div);
  }

  // Initial render
  update();
</script>
</body>
</html>
